aeso_load_forecasting:
  target: "{{ env_var('DBT_TARGET', 'dev') }}"
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', 5432) | int }}"
      user: "{{ env_var('POSTGRES_USER', 'aeso') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'aeso') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'aeso_analytics') }}"
      schema: public
      threads: 4
      keepalives_idle: 0
