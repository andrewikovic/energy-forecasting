services:
  postgres:
    image: postgres:16
    container_name: aeso_analytics_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aeso_analytics}
      POSTGRES_USER: ${POSTGRES_USER:-aeso}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aeso}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aeso} -d ${POSTGRES_DB:-aeso_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
